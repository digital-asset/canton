include required("../shared.conf")
include required("baseparticipant.conf")
canton {
  participants {
    opsparticipant = ${_baseparticipant}
    opsparticipant {
      storage.config.properties.databaseName = ${?DBPREFIX}opsparticipant
      ledger-api.port = 10008
      admin-api.port = 10009
    }
  }
  // this needs to be auto-generated depending on the number of nodes we have
  // in theory we can do this by continuation
  // file: remote-participant55.config
  //   include required("remote-participant54.config")
  //   bla bla
  remote-participants {
    participant1 {
        ledger-api.port = 10011
        admin-api.port = 10012
    }
    participant2 {
        ledger-api.port = 10021
        admin-api.port = 10022
    }
  }
  // same for synchronizers
  remote-mediators {
    mediator1 {
      admin-api.port = 4602
    }
    mediator2 {
      admin-api.port = 4612
    }
  }
  remote-sequencers {
    sequencer1 {
      public-api.port = 4401
      admin-api.port = 4402
    }
    sequencer2 {
      public-api.port = 4411
      admin-api.port = 4412
    }
  }
}

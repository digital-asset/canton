syntax = "proto3";

package com.digitalasset.canton.participant.synchronizer.v30;

import "scalapb/scalapb.proto";

message PendingLsuOperation {
  option (scalapb.message).companion_extends = "com.digitalasset.canton.version.StorageProtoVersion";

  string successor_physical_synchronizer_id = 1;
}

message PendingOnboardingTransactions {
  option (scalapb.message).companion_extends = "com.digitalasset.canton.version.StorageProtoVersion";

  // Serialized SignedTopologyTransaction messages to be used for onboarding to the synchronizer
  repeated bytes transactions = 1;
}

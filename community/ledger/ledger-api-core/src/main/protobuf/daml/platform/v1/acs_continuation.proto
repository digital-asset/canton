syntax = "proto3";

package daml.platform.v1;

option java_package = "com.daml.platform.v1";

message AcsContinuationPointerPayload {
  // the sequential_id of the event this pointer is pointing to
  int64 sequential_id = 1;
  // if the corresponding response is generated from incomplete reassignments, this offset
  // helps to filter the incomplete reassignments for continuation
  optional int64 offset_for_incomplete_reassignments = 2;
}

message AcsContinuationTokenPayload {
  // the pointer where the stream should continue from
  AcsContinuationPointerPayload pointer = 1;
  // checksum to validate the token
  bytes checksum = 2;
}

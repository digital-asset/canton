syntax = "proto3";

package daml.platform.v1;

option java_package = "com.daml.platform.v1";

// Describes the payload of a page token for listing users.
// Not intended to be handled directly by clients and should be presented to them as an opaque string.
message ListUsersPageTokenPayload {
  // Users are ordered by ``user_id``, and the next page starts with users whose ``user_id`` is larger than ``user_id_lower_bound_excl``.
  string user_id_lower_bound_excl = 1;
}

// Describes the payload of a page token for listing parties.
// Not intended to be handled directly by clients and should be presented to them as an opaque string.
message ListPartiesPageTokenPayload {
  // Parties are ordered by ``party_id``, and the next page starts with parties whose ``party_id`` is larger than ``party_id_lower_bound_excl``.
  string party_id_lower_bound_excl = 1;
}

// Describes the payload of a page token for listing vetted packages.
// Not intended to be handled directly by clients and should be presented to them as an opaque string.
message ListVettedPackagesPageTokenPayload {
  // VettedPackages are ordered by ``synchronizer_id`` and then
  // ``participant_id``. The next page starts with VettedPackages messages whose
  // synchronizer ID is strictly larger ``synchronizer_id``, or whose
  // synchronizer ID is equal to ``synchronizer_id`` and whose participant ID is
  // strictly larger than ``participant_id``.
  string synchronizer_id = 1;
  string participant_id = 2;
}

// Describes the payload of a page token for fetching update pages
// Not intended to be handled directly by clients and should be presented to them as opaque bytes.
message UpdatesPageToken {
  // from the current GetUpdatePageResponse (last returned page)
  int64 lowest_page_offset_exclusive = 1;
  // from the current GetUpdatePageResponse (last returned page)
  int64 highest_page_offset_inclusive = 2;
  // to verify version difference
  int32 version = 3;
  // to verify participant difference
  bytes participant_id_checksum = 4;
  // to verify difference in request (update_format, begin_offset_exclusive, end_offset_inclusive, descending_order)
  bytes request_checksum = 5;
}

syntax = "proto3";

package com.digitalasset.canton.protocol.v32;

import "com/digitalasset/canton/crypto/v30/crypto.proto";
import "com/digitalasset/canton/protocol/v30/participant_transaction.proto";
import "com/digitalasset/canton/protocol/v31/participant_transaction.proto";
import "scalapb/scalapb.proto";

// Messages sent by a participant as part of the transaction protocol

// Compared to v31: HashingSchemeVersion V4 enum added for development-version prepared transactions.
message ExternalAuthorization {
  option (scalapb.message).companion_extends = "com.digitalasset.canton.version.AlphaProtoVersion";

  // The hashing scheme version used when building the hash
  enum HashingSchemeVersion {
    HASHING_SCHEME_VERSION_UNSPECIFIED = 0;
    reserved 1; // Hashing Scheme V1 - unsupported
    HASHING_SCHEME_VERSION_V2 = 2;
    HASHING_SCHEME_VERSION_V3 = 3;
    HASHING_SCHEME_VERSION_V4 = 4;
  }

  repeated v30.ExternalPartyAuthorization authentications = 1;
  HashingSchemeVersion hashing_scheme_version = 2;

  // Max record time is an optional bit of signed metadata that allows an external signer to
  // know an upper limit on when it must be processed by the executing participant node to be
  // valid. Typically hours or days in the future.
  optional int64 max_record_time = 3;
}

// Compared to v31: external authorization can carry HashingSchemeVersion V4.
message SubmitterMetadata {
  option (scalapb.message).companion_extends = "com.digitalasset.canton.version.AlphaProtoVersion";

  com.digitalasset.canton.crypto.v30.Salt salt = 1;
  repeated string act_as = 2;
  string user_id = 3;
  string command_id = 4;
  string submitting_participant_uid = 5;
  string submission_id = 6; // optional; absent if not specified by submitter
  v30.DeduplicationPeriod dedup_period = 7;

  // Max sequencing time is the time allowed for a submitted transaction to be sequenced. Typically
  // seconds or minutes in the future.
  int64 max_sequencing_time = 8; // in microseconds of UTC time since Unix epoch
  ExternalAuthorization external_authorization = 9; // optional
}

message ViewExternalCallResult {
  option (scalapb.message).companion_extends = "com.digitalasset.canton.version.AlphaProtoVersion";

  string extension_id = 1;
  string function_id = 2;
  bytes config = 3;
  bytes input = 4;
  bytes output = 5;
  // Zero-based index of the exercise node in the view core traversal.
  int32 exercise_index = 6;
  // Zero-based index of the external call result on that exercise node.
  int32 call_index = 7;
  // Node-level confirming parties responsible for checking this result.
  repeated string checking_parties = 8;
}

// Compared to v31:
// - external call results are recorded for the view core.
// - rollback_context removed
// - rolled_back boolean added
// - created_core references v31 structure
message ViewParticipantData {
  option (scalapb.message).companion_extends = "com.digitalasset.canton.version.AlphaProtoVersion";

  com.digitalasset.canton.crypto.v30.Salt salt = 1;
  repeated v30.InputContract core_inputs = 2;
  repeated v31.CreatedContract created_core = 3;
  repeated string created_in_subview_archived_in_core = 4; // ids of contracts created in a subview and archived in the core
  repeated v31.ViewParticipantData.KeyResolutionWithMaintainers resolved_keys = 5;
  v31.ActionDescription action_description = 6;
  reserved 7; // was rollback_context
  repeated ViewExternalCallResult external_call_results = 8;
  bool rolled_back = 9;
}

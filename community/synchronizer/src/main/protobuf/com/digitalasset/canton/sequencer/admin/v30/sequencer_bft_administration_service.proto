syntax = "proto3";

package com.digitalasset.canton.sequencer.admin.v30;

import "com/digitalasset/canton/synchronizer/sequencing/sequencer/bftordering/v30/bft_ordering_sequencing_parameters.proto";
import "com/digitalasset/canton/synchronizer/sequencing/sequencer/bftordering/v31/bft_ordering_sequencing_parameters.proto";

service SequencerBftAdministrationService {
  // Add a peer endpoint to the list of known endpoints. The sequencer will attempt to connect to the endpoint and
  //  authenticate it.
  rpc AddPeerEndpoint(AddPeerEndpointRequest) returns (AddPeerEndpointResponse);

  // Remove a peer endpoint from the list of known endpoints. The sequencer will disconnect from the endpoint if it is
  //  currently connected.
  rpc RemovePeerEndpoint(RemovePeerEndpointRequest) returns (RemovePeerEndpointResponse);

  // List the peer endpoints that have been configured and stored in DB.
  rpc ListConfiguredEndpoints(ListConfiguredEndpointsRequest) returns (ListConfiguredEndpointsResponse);

  // Get the status of the peer network for the current node; if no endpoints are provided as arguments,
  //  it returns the global P2P network status, including both outgoing and incoming connections.
  rpc GetPeerNetworkStatus(GetPeerNetworkStatusRequest) returns (GetPeerNetworkStatusResponse);

  // Get the write readiness of the current node, which indicates whether the node is ready to accept writes
  //  based on its peer connections and quorum requirements.
  rpc GetWriteReadiness(GetWriteReadinessRequest) returns (GetWriteReadinessResponse);

  // Get the current ordering topology, including the active sequencer IDs, sequencing parameters,
  //  and leader/blacklisted sequencer IDs.
  rpc GetOrderingTopology(GetOrderingTopologyRequest) returns (GetOrderingTopologyResponse);

  // Enable or disable the collection of performance metrics on the sequencer node.
  rpc SetPerformanceMetricsEnabled(SetPerformanceMetricsEnabledRequest) returns (SetPerformanceMetricsEnabledResponse);
}

message AddPeerEndpointRequest {
  PeerEndpoint endpoint = 1;
}

message RemovePeerEndpointRequest {
  PeerEndpointId endpoint_id = 1;
}

message ListConfiguredEndpointsRequest {}

message ListConfiguredEndpointsResponse {
  repeated PeerEndpoint endpoints = 1;
}

message PeerEndpoint {
  string address = 1;
  uint32 port = 2;
  oneof security {
    PlainTextPeerEndpoint plain_text = 3;
    TlsPeerEndpoint tls = 4;
  }
}

message PeerEndpointId {
  string address = 1;
  uint32 port = 2;
  bool tls = 3;
}

message PlainTextPeerEndpoint {}

message TlsPeerEndpoint {
  optional bytes custom_server_trust_certificate = 1;
  TlsClientCertificate client_certificate = 2;
}

message TlsClientCertificate {
  bytes certificate_chain = 1;
  string private_key_file = 2;
}

message AddPeerEndpointResponse {
  // False if already present
  bool added = 1;
}
message RemovePeerEndpointResponse {
  // False if not found
  bool removed = 1;
}

message Authenticated {
  string sequencer_id = 1;
}

message GetPeerNetworkStatusRequest {
  // If empty, the status of all known endpoints will be returned
  repeated PeerEndpointId endpoint_ids = 1;
}

message GetPeerNetworkStatusResponse {
  repeated PeerConnectionStatus statuses = 1;
}

message PeerConnectionStatus {
  oneof status {
    // An outgoing or incoming connection for which the endpoint is known
    PeerEndpointStatus peer_endpoint_status = 1;
    // An incoming connection for which the endpoint is not known
    Authenticated peer_incoming_connection = 2;
  }
}

message PeerEndpointStatus {
  PeerEndpointId endpoint_id = 1;
  bool is_outgoing_connection = 2;
  PeerEndpointHealth health = 3;
}

message PeerEndpointHealth {
  PeerEndpointHealthStatus status = 1;
  optional string description = 2;
}

message PeerEndpointHealthStatus {
  oneof status {
    UnknownEndpoint unknown_endpoint = 1;
    Disconnected disconnected = 2;
    Unauthenticated unauthenticated = 3;
    Authenticated authenticated = 4;
  }

  message UnknownEndpoint {}
  message Disconnected {}
  message Unauthenticated {}
}

message GetWriteReadinessRequest {}

message GetWriteReadinessResponse {
  message P2P {
    int32 authenticated_peers_count = 1;
    int32 required_quorum = 2;
  }

  message Ready {
    P2P p2p = 1;
  }

  message P2PNotReady {
    P2P p2p = 1;
  }

  oneof readiness {
    Ready ready = 1;
    P2PNotReady p2p_not_ready = 2;
  }
}

message GetOrderingTopologyRequest {}

message GetOrderingTopologyResponse {
  // The current epoch, through which the topology is valid.
  int64 current_epoch = 1;
  // The sequencer IDs of the active BFT ordering nodes in the network.
  repeated string sequencer_ids = 2;
  // The sequencing parameters
  oneof dynamic_sequencing_parameters {
    com.digitalasset.canton.synchronizer.sequencing.sequencer.bftordering.v30.DynamicSequencingParametersPayload dynamic_sequencing_parameters_payload = 3;
    com.digitalasset.canton.synchronizer.sequencing.sequencer.bftordering.v31.DynamicSequencingParametersPayload dynamic_sequencing_parameters_payload31 = 4;
  }
  // The sequencer IDs of the BFT ordering nodes in the network that are consensus leaders.
  repeated string leader_sequencer_ids = 5;
  // The sequencer IDs of the BFT ordering nodes in the network that are blacklisted.
  repeated string blacklisted_sequencer_ids = 6;
}

message SetPerformanceMetricsEnabledRequest {
  bool enabled = 1;
}

message SetPerformanceMetricsEnabledResponse {}

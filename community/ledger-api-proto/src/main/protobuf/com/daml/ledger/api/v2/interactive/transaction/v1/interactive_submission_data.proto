syntax = "proto3";

package com.daml.ledger.api.v2.interactive.transaction.v1;

import "com/daml/ledger/api/v2/interactive/interactive_submission_common_data.proto";
import "com/daml/ledger/api/v2/value.proto";

option csharp_namespace = "Com.Daml.Ledger.Api.V2.Interactive.Transaction.V1";
option java_outer_classname = "InteractiveSubmissionDataOuterClass";
option java_package = "com.daml.ledger.api.v2.interactive.transaction.v1";

/*
 * External Call Results
 */

// Result of an external call made during transaction execution.
// External calls are deterministic calls to participant extension services.
// Results are stored in the transaction and replayed during validation.
message ExternalCallResult {
  // Extension service identifier.
  //
  // Required
  string extension_id = 1;
  // Function identifier within the extension.
  //
  // Required
  string function_id = 2;
  // Extension configuration hash bytes.
  //
  // Required: must be non-empty
  bytes config = 3;
  // Input data sent to the extension.
  //
  // Required: must be non-empty
  bytes input = 4;
  // Output data returned by the extension.
  //
  // Required: must be non-empty
  bytes output = 5;
}

/*
 * Transaction Nodes
 */

// Fetch node
message Fetch {
  // Specific LF serialization version of the node
  //
  // Required
  string lf_version = 1;
  // Required
  string contract_id = 2;
  // Required
  string package_name = 3;
  // The identifier uses the package-id reference format.
  //
  // Required
  Identifier template_id = 4;
  // Required: must be non-empty
  repeated string signatories = 5;
  // Required: must be non-empty
  repeated string stakeholders = 6;
  // Required: must be non-empty
  repeated string acting_parties = 7;
  // Optional
  Identifier interface_id = 8;
  // Can only be populated from lf_version >= 2
  //
  // Optional
  optional GlobalKeyWithMaintainers key = 9;
  // Can only be true from lf_version >= 2
  //
  // Required
  bool by_key = 10;
}

// Exercise node
message Exercise {
  // Specific LF serialization version of the node
  //
  // Required
  string lf_version = 1;
  // Required
  string contract_id = 2;
  // Required
  string package_name = 3;
  // The identifier uses the package-id reference format.
  //
  // Required
  Identifier template_id = 4;
  // Required: must be non-empty
  repeated string signatories = 5;
  // Required: must be non-empty
  repeated string stakeholders = 6;
  // Required: must be non-empty
  repeated string acting_parties = 7;
  // The identifier uses the package-id reference format.
  //
  // Optional
  Identifier interface_id = 8;
  // Required
  string choice_id = 9;
  // Required
  Value chosen_value = 10;
  // Required
  bool consuming = 11;
  // Optional: can be empty
  repeated string children = 12;
  // Optional
  Value exercise_result = 13;
  // Optional: can be empty
  repeated string choice_observers = 14;
  // Can only be populated from lf_version >= 2
  //
  // Optional
  optional GlobalKeyWithMaintainers key = 15;
  // Can only be true from lf_version >= 2
  //
  // Required
  bool by_key = 16;
  // Can only be populated from lf_version dev.
  //
  // Results of external calls made during this exercise.
  // These results are carried for external-call replay and validation.
  // They are encoded into the prepared transaction hash starting with
  // HASHING_SCHEME_VERSION_V4.
  //
  // Optional: can be empty
  repeated ExternalCallResult external_call_results = 17;
}

// Create Node
message Create {
  // Specific LF serialization version of the node
  //
  // Required
  string lf_version = 1;
  // Required
  string contract_id = 2;
  // Required
  string package_name = 3;
  // The identifier uses the package-id reference format.
  //
  // Required
  Identifier template_id = 4;
  // Required
  Value argument = 5;
  // Required: must be non-empty
  repeated string signatories = 6;
  // Required: must be non-empty
  repeated string stakeholders = 7;
  // Only populated from lf_version >= 2
  //
  // Optional
  optional GlobalKeyWithMaintainers key = 8;
}

// Rollback Node
message Rollback {
  // Required: must be non-empty
  repeated string children = 1;
}

message QueryByKey {
  // Specific LF serialization version of the node
  //
  // Required
  string lf_version = 1;
  // Required
  string package_name = 2;
  // The identifier uses the package-id reference format.
  //
  // Required
  Identifier template_id = 3;
  // Required
  bool exhaustive = 4;
  // key to query for
  //
  // Required
  GlobalKeyWithMaintainers key = 5;
  // Result of the query: list of contract Ids matching the query
  //
  // Optional: can be empty
  repeated string result = 6;
}

message Node {
  // Required
  oneof node_type {
    Create create = 1;
    Fetch fetch = 2;
    Exercise exercise = 3;
    Rollback rollback = 4;
    // Only from PV 35
    QueryByKey query_by_key = 5;
  }
}

slack_red_main_with_volunteer:
  parameters:
    webhook_url:
      type: string
      default: $SLACK_WEBHOOK_TEAM_CANTON_INTERNAL
    fixed_volunteer:
      type: string
      default: ""
      description: "If set, skip random selection and always ping this Slack user ID."

  steps:
    - run:
        name: Choose volunteer
        when: always
        command: |
          FIXED="<< parameters.fixed_volunteer >>"
          if [ -n "$FIXED" ]; then
            SELECTED_VOLUNTEER="$FIXED"
          elif command -v nix-shell >/dev/null 2>&1; then
            SELECTED_VOLUNTEER=$(.ci/nix-exec python3 scripts/ci/select_rota.py --job "$CIRCLE_JOB")
          else
            # Machine executors (e.g. test_ping_arm) have no nix, so nix-exec cannot run.
            # select_rota.py needs cryptography to sign the Google auth JWT; install it
            # best-effort so we still ping the live rota person. If the install fails the
            # script degrades to its deterministic roster fallback rather than breaking.
            # The plain install covers older pip; the retry adds --break-system-packages
            # (pip 23+) for images that mark the system Python externally managed (PEP 668).
            python3 -m pip install -q --user cryptography \
              || python3 -m pip install -q --user --break-system-packages cryptography \
              || echo "warning: cryptography install failed; select_rota will use its roster fallback" >&2
            SELECTED_VOLUNTEER=$(python3 scripts/ci/select_rota.py --job "$CIRCLE_JOB")
          fi

          echo "$SELECTED_VOLUNTEER"
          echo "export SELECTED_VOLUNTEER=\"${SELECTED_VOLUNTEER}\"" >> $BASH_ENV
    - slack/status:
        mentions: "${SELECTED_VOLUNTEER}"
        fail_only: true
        only_for_branches: main,release-line-3.4,release-line-3.5,release-line-3.6,release-line-3.7,release-line-3.8,release-line-3.9,release-line-3.10
        failure_message: 'A \`$CIRCLE_JOB\` job has failed on branch \`$CIRCLE_BRANCH\`. You are on rota, so please take a look.'
        webhook: << parameters.webhook_url >>

# This command will send a notification to team-sdk-updates
# about docs or daml update in canton
send_slack_notification_for_sdk_updates:
  description: Send a message to slack
  parameters:
    message:
      type: string
      default: ""
    from_version:
      type: string
      default: ""
    to_version:
      type: string
      default: ""
    pr_url:
      type: string
      default: ""
  steps:
    - run:
        name: send message to slack
        command: |
          message="<< parameters.message >>"
          from="<< parameters.from_version >>"
          to="<< parameters.to_version >>"
          pr_url="<< parameters.pr_url >>"

          . scripts/ci/common.sh
          tell_slack "$message" "$SLACK_WEBHOOK_TEAM_SDK_UPDATES" "$pr_url" "$from" "$to"
